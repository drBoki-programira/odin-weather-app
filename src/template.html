<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
  </head>
  <body>
    <section id="header">The Weather App</section>
    <section id="main">
      <form>
        <div>
          <input type="text" placeholder="Enter location" />
          <div class="toggle">
            <span>℃</span>
            <input type="checkbox" />
            <label></label>
            <span>°F</span>
          </div>
        </div>
        <button type="submit">Search</button>
      </form>
      <div id="content"></div>
    </section>
    <section id="footer">
      Created by <a href="https://github.com/drBoki-programira">Boki</a>
    </section>
  </body>
</html>
