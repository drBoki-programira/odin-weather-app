<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To Do App</title>
  </head>
  <body>
    <section class="header">To Do App</section>
    <section class="container">
      <div class="subtitle">My Projects</div>
      <hr />
      <ul id="projects-list"></ul>
    </section>
    <section class="container">
      <div class="subtitle">Project Name</div>
      <hr />
      <ul id="project-content"></ul>
    </section>
    <section class="container">
      <div class="subtitle">Task Details</div>
      <hr />
      <div id="task-details">
        <div class="info-message">Click on a task for more details</div>
      </div>
    </section>
    <section class="footer">
      Created by <a href="https://github.com/drBoki-programira">Boki</a>
    </section>
  </body>
</html>
